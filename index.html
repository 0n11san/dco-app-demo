<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DCO CMS — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="classification-banner">UNCLASSIFIED // FOR OFFICIAL USE ONLY</div>

  <div class="login-page">
    <div class="login-header">
      <span class="login-star">&#9733;</span>
      <div class="login-title">DCO Contract Management System</div>
      <div class="login-subtitle">ARCYBER &nbsp;|&nbsp; Defensive Cyber Operations</div>
    </div>

    <div class="login-card">
      <h2>Operator Authentication</h2>

      <div class="error-msg" id="loginError"></div>

      <form id="loginForm" autocomplete="off" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" type="text" id="username" name="username"
            placeholder="Enter username" autocomplete="username" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" type="password" id="password" name="password"
            placeholder="Enter password" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center;margin-top:8px">
          AUTHENTICATE
        </button>
      </form>
    </div>
  </div>

  <div class="classification-banner">UNCLASSIFIED // FOR OFFICIAL USE ONLY</div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function() { if (AUTH.getSession()) window.location.href = 'landing.html'; })();

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      errorEl.classList.remove('visible');

      const result = AUTH.validate(username, password);
      if (!result.success) {
        errorEl.textContent = result.error;
        errorEl.classList.add('visible');
        return;
      }
      AUTH.setSession(username, result.role);
      window.location.href = 'landing.html';
    });
  </script>
</body>
</html>
